<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#b71c1c,#e53935);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    width:130px;
    height:130px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#b71c1c;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#b71c1c;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#8b0000;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#b71c1c;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#777;
}
</style>

</head>

<body>

<div class="login-container">

    <!-- College Logo -->
    <img src="APEC logo.png" class="logo" alt="APEC Logo">

    <h2>Adhiparasakthi Engineering College</h2>
    <p>Student Login Portal</p>

    <form>

        <input type="text"
               class="input-box"
               placeholder="Register Number"
               required>

        <input type="password"
               class="input-box"
               placeholder="Password"
               required>

        <button type="submit">Login</button>

    </form>

    <a href="#">Forgot Password?</a>

    <div class="footer">
        © 2026 Adhiparasakthi Engineering College<br>
        Melmaruvathur, Tamil Nadu
    </div>

</div>

</body>
</html>
